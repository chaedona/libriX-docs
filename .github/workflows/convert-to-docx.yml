name: Convert MD to DOCX

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc

      - name: Create output directory
        run: mkdir -p output

      - name: Convert all MD files to DOCX
        run: |
          mapfile -t md_files < <(find docs -name "*.md" | sort)
          echo "총 변환 대상: ${#md_files[@]} 개"

          for md_file in "${md_files[@]}"; do

            md_dir=$(dirname "$md_file")
            relative_dir="${md_dir#docs/}"
            out_dir="output/${relative_dir}"
            mkdir -p "$out_dir"

            base_name=$(basename "$md_file" .md)
            out_file="${out_dir}/${base_name}.docx"

            echo "Converting: $md_file → $out_file"

            # 전처리 실행
            python3 .github/scripts/preprocess_md.py "$md_file"

            # 디버그: .tmp 파일 생성 여부 및 줄바꿈 확인
            if [ -f "${md_file}.tmp" ]; then
              echo "[DEBUG] .tmp 생성 성공"
              echo "[DEBUG] 원본 줄수: $(wc -l < "$md_file")"
              echo "[DEBUG] 전처리 후 줄수: $(wc -l < "${md_file}.tmp")"
            else
              echo "[DEBUG] .tmp 생성 실패! 원본으로 변환합니다."
              cp "$md_file" "${md_file}.tmp"
            fi

            # pandoc 변환
            pandoc "${md_file}.tmp" \
              -o "$out_file" \
              --from markdown-hard_line_breaks-yaml_metadata_block-tex_math_dollars \
              --to docx \
              --resource-path="${md_dir}:${md_dir}/images:." \
              && rm -f "${md_file}.tmp" \
              || { echo "WARNING: Failed to convert $md_file"; rm -f "${md_file}.tmp"; }

          done

      - name: List converted files
        run: |
          echo "===== 변환된 DOCX 파일 목록 ====="
          find output -name "*.docx" | sort
          echo "===== 총 파일 수 ====="
          find output -name "*.docx" | wc -l

      - name: Upload DOCX files as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: librix-docs-docx-${{ github.run_number }}
          path: output/**/*.docx
          retention-days: 30
          if-no-files-found: warnname: Convert MD to DOCX

